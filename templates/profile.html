<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Профиль | ОГЭRUS</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .main-content { flex:1; padding:40px 32px; max-width:1400px; margin:0 auto; width:100%; }
        .profile-header { display:flex; align-items:center; gap:40px; margin-bottom:40px; flex-wrap:wrap; }
        .avatar-section { text-align:center; }
        .avatar { width:120px; height:120px; border-radius:50%; object-fit:cover; border:4px solid white; box-shadow:0 8px 20px rgba(0,0,0,0.1); }
        .avatar-form { margin-top:12px; }
        .avatar-form input { font-size:12px; }
        .avatar-form button { margin-top:8px; padding:6px 16px; background:linear-gradient(105deg,#f59e0b,#ec4899); border:none; border-radius:20px; color:white; font-weight:600; cursor:pointer; }
        .user-welcome h1 { font-size:36px; background:linear-gradient(145deg,#a21caf,#fbbf24,#f43f5e); background-clip:text; -webkit-background-clip:text; color:transparent; }
        .stats-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(300px,1fr)); gap:24px; margin-bottom:40px; }
        .stat-card { background:rgba(255,255,255,0.7); backdrop-filter:blur(16px); padding:24px; border-radius:32px; border:1px solid rgba(255,255,255,0.8); }
        .stat-title { font-size:18px; font-weight:700; color:#4c1d95; margin-bottom:16px; }
        .chart-container { position:relative; height:400px; width:100%; }
        .checklist { max-height:300px; overflow-y:auto; }
        .checklist-item { display:flex; align-items:center; gap:12px; padding:8px 0; border-bottom:1px solid rgba(216,180,254,0.3); }
        .checklist-item input { width:20px; height:20px; cursor:pointer; }
        .problem-topic { padding:10px; background:rgba(254,202,202,0.5); border-radius:16px; margin-bottom:8px; }
        .achievements-grid { display:flex; flex-wrap:wrap; gap:16px; margin-top:16px; }
        .achievement { text-align:center; padding:12px; background:rgba(255,255,255,0.6); border-radius:20px; min-width:100px; }
        .achievement.earned { background:rgba(187,247,208,0.6); border:1px solid #86efac; }
        .achievement-icon { font-size:32px; }
        .tab-buttons { display:flex; gap:12px; margin-bottom:24px; flex-wrap:wrap; }
        .tab-btn { padding:10px 24px; background:rgba(255,255,255,0.5); border:1px solid #d8b4fe; border-radius:40px; cursor:pointer; font-weight:600; color:#7e22ce; }
        .tab-btn.active { background:linear-gradient(105deg,#f59e0b,#ec4899); color:white; border:none; }
        .tab-content { display:none; }
        .tab-content.active { display:block; }
        @media (max-width:700px) { .profile-header { flex-direction:column; text-align:center; } }
    </style>
</head>
<body>
    {% include '_header.html' %}

    <div class="main-content">
        <div class="profile-header">
            <div class="avatar-section">
                <img src="{{ user.avatar or url_for('static', filename='default-avatar.png') }}" alt="Avatar" class="avatar" id="avatarImg">
                <form action="{{ url_for('profile.upload_avatar') }}" method="POST" enctype="multipart/form-data" class="avatar-form">
                    <input type="file" name="avatar" accept="image/*" required>
                    <button type="submit">Загрузить</button>
                </form>
            </div>
            <div class="user-welcome">
                <h1>{{ user.username }}</h1>
                <p>{{ user.email }}</p>
                <p>На платформе с {{ user.created_at.strftime('%d.%m.%Y') }}</p>
            </div>
        </div>

        <div class="tab-buttons">
            <button class="tab-btn active" data-tab="stats">Прогресс</button>
            <button class="tab-btn" data-tab="checklist">Чек-лист</button>
            <button class="tab-btn" data-tab="problems">Проблемные темы</button>
            <button class="tab-btn" data-tab="achievements">Достижения</button>
        </div>

        <div id="stats" class="tab-content active">
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-title">Прогресс по навыкам</div>
                    <div class="chart-container">
                        <canvas id="skillsChart"></canvas>
                    </div>
                    <div id="progressEmptyMsg" style="display:none; text-align:center; margin-top:16px;"></div>
                </div>
            </div>
        </div>

        <div id="checklist" class="tab-content">
            <div class="stat-card">
                <div class="stat-title">Чек-лист тем для подготовки</div>
                <div class="checklist" id="checklistContainer"><p>Загрузка...</p></div>
            </div>
        </div>

        <div id="problems" class="tab-content">
            <div class="stat-card">
                <div class="stat-title">Темы, требующие внимания</div>
                <div id="problemTopicsContainer"><p>Загрузка...</p></div>
            </div>
        </div>

        <div id="achievements" class="tab-content">
            <div class="stat-card">
                <div class="stat-title">Ваши достижения</div>
                <div id="achievementsContainer" class="achievements-grid"><p>Загрузка...</p></div>
            </div>
        </div>
    </div>

    <div class="footer">2026 Подготовка ОГЭ Русский язык</div>

    <script>
        let skillsChart = null;

        async function loadProgress() {
            const response = await fetch('/api/progress_data');
            const data = await response.json();
            const values = Object.values(data);
            const allZero = values.every(v => v === 0);

            const msgDiv = document.getElementById('progressEmptyMsg');
            const chartCanvas = document.getElementById('skillsChart');
            const chartContainer = document.querySelector('.chart-container');

            if (allZero) {
                if (chartContainer) chartContainer.style.display = 'none';
                if (msgDiv) {
                    msgDiv.style.display = 'block';
                    msgDiv.innerHTML = 'Пока нет данных. Начните решать задания, и здесь появится статистика 🚀';
                }
                return;
            }

            if (chartContainer) chartContainer.style.display = 'block';
            if (msgDiv) msgDiv.style.display = 'none';
            if (skillsChart) skillsChart.destroy();

            const ctx = chartCanvas.getContext('2d');
            skillsChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: Object.keys(data),
                    datasets: [{
                        data: values,
                        backgroundColor: ['#a855f7', '#ec4899', '#fbbf24', '#f97316', '#10b981'],
                        borderWidth: 0
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    plugins: {
                        legend: { position: 'bottom', labels: { boxWidth: 12, padding: 12, font: { size: 12 } } },
                        tooltip: { callbacks: { label: (ctx) => `${ctx.label}: ${ctx.raw}%` } }
                    }
                }
            });
        }

        async function loadChecklist() {
            const response = await fetch('/api/checklist');
            const items = await response.json();
            if (items.length === 0) {
                await fetch('/api/checklist/init', { method: 'POST' });
                return loadChecklist();
            }
            const container = document.getElementById('checklistContainer');
            container.innerHTML = '';
            for (const item of items) {
                const div = document.createElement('div');
                div.className = 'checklist-item';
                div.innerHTML = `
                    <input type="checkbox" data-id="${item.id}" ${item.checked ? 'checked' : ''}>
                    <span style="${item.checked ? 'text-decoration: line-through; color: #a855f7;' : ''}">${item.topic_name}</span>
                `;
                container.appendChild(div);
            }
            document.querySelectorAll('.checklist-item input').forEach(cb => {
                cb.addEventListener('change', async (e) => {
                    const id = e.target.dataset.id;
                    await fetch(`/api/checklist/toggle/${id}`, { method: 'POST' });
                    const span = e.target.parentElement.querySelector('span');
                    if (e.target.checked) {
                        span.style.textDecoration = 'line-through';
                        span.style.color = '#a855f7';
                    } else {
                        span.style.textDecoration = 'none';
                        span.style.color = '';
                    }
                });
            });
        }

        async function loadProblemTopics() {
            const response = await fetch('/api/problem_topics');
            const topics = await response.json();
            const container = document.getElementById('problemTopicsContainer');
            if (topics.length === 0) {
                container.innerHTML = '<p>Отлично! У вас нет проблемных тем 🎉</p>';
                return;
            }
            container.innerHTML = topics.map(t => `
                <div class="problem-topic">
                    <strong>${t.name}</strong> — успешность: ${t.success_rate}%
                </div>
            `).join('');
        }

        async function loadAchievements() {
            const response = await fetch('/api/achievements');
            const achievements = await response.json();
            const container = document.getElementById('achievementsContainer');

            const earnedOnly = achievements.filter(a => a.earned);

            if (earnedOnly.length === 0) {
                container.innerHTML = '<p>Пока нет достижений. Продолжайте решать задания!</p>';
                return;
            }

            container.innerHTML = earnedOnly.map(a => `
                <div class="achievement earned">
                    <div class="achievement-icon">${a.icon}</div>
                    <div><strong>${a.name}</strong></div>
                    <div style="font-size: 12px;">${a.description}</div>
                </div>
            `).join('');
        }

        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                btn.classList.add('active');
                document.getElementById(btn.dataset.tab).classList.add('active');
                if (btn.dataset.tab === 'stats') loadProgress();
                if (btn.dataset.tab === 'checklist') loadChecklist();
                if (btn.dataset.tab === 'problems') loadProblemTopics();
                if (btn.dataset.tab === 'achievements') loadAchievements();
            });
        });

        loadProgress();
        loadChecklist();
        loadProblemTopics();
        loadAchievements();
        fetch('/api/check_achievements');
    </script>
</body>
</html>
