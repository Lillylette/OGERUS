<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Каталог заданий | ОГЭRUS</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Plus Jakarta Sans', 'Inter', system-ui, sans-serif;
            background: linear-gradient(145deg, #fdf4ff 0%, #fae8ff 40%, #fef3c7 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: -20%;
            right: -10%;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(192, 132, 252, 0.25) 0%, rgba(192, 132, 252, 0) 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
        }

        body::after {
            content: '';
            position: fixed;
            bottom: -10%;
            left: -5%;
            width: 450px;
            height: 450px;
            background: radial-gradient(circle, rgba(251, 191, 36, 0.2) 0%, rgba(251, 191, 36, 0) 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
        }

        .header {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            padding: 16px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.8);
            position: relative;
            z-index: 10;
        }

        .logo {
            font-size: 26px;
            font-weight: 800;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #a855f7, #ec4899, #fbbf24);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        .logo a { text-decoration: none; color: inherit; }

        .btn {
            padding: 8px 24px;
            border-radius: 100px;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.25s;
            text-decoration: none;
            display: inline-block;
            text-align: center;
            cursor: pointer;
        }

        .btn-back {
            background: transparent;
            color: #7e22ce;
            border: 1.5px solid #d8b4fe;
        }

        .btn-back:hover {
            background: #f3e8ff;
            border-color: #c084fc;
        }

        .main-content {
            flex: 1;
            padding: 32px 24px;
            position: relative;
            z-index: 2;
            max-width: 800px;
            margin: 0 auto;
            width: 100%;
        }

        .page-title {
            font-size: 36px;
            font-weight: 800;
            letter-spacing: -1px;
            background: linear-gradient(145deg, #a21caf, #fbbf24, #f43f5e);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 28px;
        }

        .category {
            margin-bottom: 24px;
        }

        .category-title {
            font-size: 16px;
            font-weight: 700;
            color: #4c1d95;
            margin-bottom: 10px;
            padding-left: 12px;
            border-left: 3px solid #f43f5e;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .task-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .task-item {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            padding: 12px 18px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.8);
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.2s;
        }

        .task-item:hover {
            background: white;
            border-color: #d8b4fe;
            transform: translateX(3px);
        }

        .task-info {
            display: flex;
            align-items: center;
            gap: 14px;
            flex: 1;
        }

        .task-title {
            font-weight: 600;
            color: #2c3e50;
            font-size: 15px;
        }

        .difficulty-badge {
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            white-space: nowrap;
        }

        .difficulty-low {
            background: #d4edda;
            color: #166534;
        }

        .difficulty-medium {
            background: #fef3c7;
            color: #92400e;
        }

        .difficulty-high {
            background: #fce7f3;
            color: #9d174d;
        }

        .btn-solve {
            padding: 6px 18px;
            border-radius: 100px;
            font-weight: 600;
            font-size: 13px;
            text-decoration: none;
            background: linear-gradient(105deg, #f59e0b, #ec4899);
            color: white;
            box-shadow: 0 3px 8px rgba(236, 72, 153, 0.2);
            transition: all 0.2s;
            white-space: nowrap;
        }

        .btn-solve:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 14px rgba(236, 72, 153, 0.3);
        }

        .footer {
            text-align: center;
            padding: 20px;
            color: #6b21a5;
            font-weight: 500;
            font-size: 13px;
            background: rgba(255, 245, 250, 0.5);
            backdrop-filter: blur(8px);
            border-top: 1px solid rgba(216, 180, 254, 0.5);
        }

        @media (max-width: 600px) {
            .task-item {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }
            .btn-solve {
                width: 100%;
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo"><a href="/">OGERUS</a></div>
        <div style="display: flex; gap: 10px;">
            <a href="/profile" class="btn btn-back">Профиль</a>
            <a href="/" class="btn btn-back">На главную</a>
        </div>
    </div>

    <div class="main-content">
        <h1 class="page-title">Каталог заданий</h1>

        {% for category, tasks in categories.items() %}
        <div class="category">
            <h2 class="category-title">{{ category }}</h2>
            <ul class="task-list">
                {% for task in tasks[:5] %}
                <li class="task-item">
                    <div class="task-info">
                        <span class="task-title">{{ task.title }}</span>
                        <span class="difficulty-badge 
                            {% if task.difficulty == 'Низкий' %}difficulty-low
                            {% elif task.difficulty == 'Средний' %}difficulty-medium
                            {% else %}difficulty-high{% endif %}
                        ">{{ task.difficulty }}</span>
                    </div>
                    <a href="{{ url_for('view_task', task_id=task.id) }}" class="btn-solve">Решать</a>
                </li>
                {% endfor %}
            </ul>
        </div>
        {% endfor %}
    </div>

    <div class="footer">
        2026 Подготовка ОГЭ Русский язык
    </div>
</body>
</html>
