<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Интерактивный тест по пунктуации | ОГЭRUS</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        .main-content { max-width: 1200px; margin: 40px auto; padding: 0 24px; }
        .test-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 24px; margin-top: 40px; }
        .test-card { background: rgba(255,255,255,0.9); backdrop-filter: blur(16px); border-radius: 32px; padding: 24px; border: 1px solid rgba(255,255,255,0.8); transition: transform 0.2s; }
        .test-card:hover { transform: translateY(-4px); }
        .test-card h3 { color: #4c1d95; margin-bottom: 12px; font-size: 20px; }
        .test-text { color: #6b21a5; margin-bottom: 20px; line-height: 1.6; font-family: monospace; font-size: 16px; }
        .btn-start { display: inline-block; padding: 10px 24px; background: linear-gradient(105deg, #f59e0b, #ec4899); color: white; border-radius: 40px; text-decoration: none; font-weight: 600; }
        .btn-start:hover { transform: translateY(-2px); }
        .badge { background: #f3e8ff; color: #7e22ce; padding: 4px 12px; border-radius: 20px; font-size: 12px; display: inline-block; margin-bottom: 12px; }
    </style>
</head>
<body>
    {% include '_header.html' %}
    
    <div class="main-content">
        <h1 style="font-size: 36px; background: linear-gradient(145deg,#a21caf,#fbbf24,#f43f5e); background-clip:text; -webkit-background-clip:text; color:transparent;">
            {{ test_name }}
        </h1>
        <p class="subtitle" style="color:#6b21a5; margin-bottom: 20px;">Кликните на любое слово, чтобы поставить знак препинания после него</p>
        
        <div class="test-grid">
            {% for test in tests %}
            <div class="test-card">
                <div class="badge">Задание {{ loop.index }}</div>
                <h3>Расставьте знаки препинания</h3>
                <div class="test-text">{{ test.text }}</div>
                <a href="{{ url_for('punctuation_test.run_test', task_id=test.id) }}" class="btn-start">Начать тест →</a>
            </div>
            {% endfor %}
        </div>
    </div>
    
    <div class="footer">2026 Подготовка ОГЭ Русский язык</div>
</body>
</html>
