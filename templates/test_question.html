<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Тест: вопрос {{ current }} из {{ total }} | ОГЭRUS</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        .test-container {
            max-width: 800px;
            margin: 40px auto;
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            padding: 32px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.1);
        }
        .progress {
            font-size: 14px;
            color: #7e22ce;
            margin-bottom: 20px;
            font-weight: 600;
        }
        .question-text {
            font-size: 18px;
            line-height: 1.6;
            margin-bottom: 24px;
            color: #1e1b4b;
            white-space: pre-wrap;
        }
        .answer-input {
            width: 100%;
            padding: 14px 18px;
            font-size: 16px;
            border: 2px solid #d8b4fe;
            border-radius: 20px;
            margin-bottom: 24px;
            outline: none;
        }
        .answer-input:focus {
            border-color: #ec4899;
        }
        .next-btn {
            background: linear-gradient(105deg, #f59e0b, #ec4899);
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 40px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            width: 100%;
            transition: transform 0.2s;
        }
        .next-btn:hover {
            transform: translateY(-2px);
        }
        .back-link {
            display: inline-block;
            margin-top: 20px;
            color: #7e22ce;
            text-decoration: none;
        }
        .digit-marker {
            display: inline-block;
            width: 30px;
            height: 30px;
            line-height: 30px;
            text-align: center;
            background: #ede9fe;
            border-radius: 50%;
            margin: 0 3px;
            font-weight: 700;
            color: #5b21b6;
            font-size: 16px;
            vertical-align: middle;
        }
    </style>
</head>
<body>
    {% include '_header.html' %}

    <div class="test-container">
        <div class="progress">Вопрос {{ current }} из {{ total }}</div>
        <div class="question-text">
            {% if question.task_type == 'task5' %}
                {{ question.text | regex_replace('\((\d+)\)', '<span class="digit-marker">\\1</span>') | safe }}
            {% else %}
                {{ question.text }}
            {% endif %}
        </div>
        <input type="text" id="answerInput" class="answer-input" placeholder="Введите ответ" autocomplete="off">
        <button id="submitBtn" class="next-btn">
            {% if current == total %}Завершить тест{% else %}Далее →{% endif %}
        </button>
        <div style="text-align: center;">
            <a href="{{ url_for('tasks.tasks') }}" class="back-link">← Прервать тест</a>
        </div>
    </div>

    <script>
        const submitBtn = document.getElementById('submitBtn');
        const answerInput = document.getElementById('answerInput');

        submitBtn.addEventListener('click', async () => {
            const answer = answerInput.value.trim();
            if (!answer) {
                alert('Пожалуйста, введите ответ');
                return;
            }

            const response = await fetch('/api/test/submit', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    index: {{ q_index }},
                    answer: answer
                })
            });
            const data = await response.json();
            if (data.finished) {
                window.location.href = "{{ url_for('tasks.test_finish') }}";
            } else {
                window.location.href = "/test/question/" + data.next_index;
            }
        });

        // Отправка по Enter
        answerInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') submitBtn.click();
        });
    </script>

    <div class="footer">2026 Подготовка ОГЭ Русский язык</div>
</body>
</html>
