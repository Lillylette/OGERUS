<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ task_name }} | ОГЭRUS</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        .main-content { flex:1; padding: 40px 32px; max-width: 900px; margin: 0 auto; width: 100%; }
        .task-card { background: white; border-radius: 24px; padding: 32px; box-shadow: 0 8px 30px rgba(0,0,0,0.05); }
        .back-link { display: inline-block; margin-bottom: 20px; color: #7e22ce; text-decoration: none; font-weight: 600; }
        .task-title { font-size: 24px; font-weight: 800; color: #4c1d95; margin-bottom: 12px; }
        .task-description { background: #fff3e0; padding: 12px 16px; border-radius: 12px; margin-bottom: 24px; color: #b45309; font-weight: 600; }
        .task-text { font-size: 18px; line-height: 1.8; margin-bottom: 32px; color: #1e1b4b; white-space: pre-wrap; word-break: break-word; }
        .digit-marker { display: inline-block; width: 30px; height: 30px; line-height: 30px; text-align: center; background: #ede9fe; border-radius: 50%; margin: 0 3px; font-weight: 700; color: #5b21b6; font-size: 16px; vertical-align: middle; }
        .answer-section { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
        .answer-input { flex: 1; min-width: 200px; padding: 12px 16px; border: 2px solid #d8b4fe; border-radius: 12px; font-size: 16px; outline: none; }
        .answer-input:focus { border-color: #a855f7; }
        .submit-btn { padding: 12px 24px; background: linear-gradient(105deg, #f59e0b, #ec4899); border: none; border-radius: 12px; color: white; font-weight: 700; cursor: pointer; }
        .result-message { margin-top: 16px; padding: 10px; border-radius: 8px; font-weight: 600; }
        @media (max-width: 700px) { .main-content { padding: 20px 16px; } }
    </style>
</head>
<body>
    {% include '_header.html' %}

    <div class="main-content">
        <div class="task-card">
            <a href="{{ url_for('tasks.tasks') }}" class="back-link">← Назад к каталогу</a>

            <h1 class="task-title">{{ task_name }}</h1>

            <!-- Выводим ИНДИВИДУАЛЬНОЕ описание задания -->
            {% if task.description %}
            <div class="task-description">{{ task.description }}</div>
            {% endif %}

            <div class="task-text">
                {% if task_type == 'task5' %}
                    {{ task.text | regex_replace('\((\d+)\)', '<span class="digit-marker">\\1</span>') | safe }}
                {% else %}
                    {{ task.text }}
                {% endif %}
            </div>

            <div class="answer-section">
                <input type="text" id="answerInput" class="answer-input" placeholder="Ваш ответ">
                <button id="submitBtn" class="submit-btn">Проверить</button>
            </div>
            <div id="resultMessage" class="result-message"></div>
        </div>
    </div>

    <div id="task-data"
         data-task-type="{{ task_type }}"
         data-topic-id="{{ task.id }}"
         data-correct-answer="{{ task.answer }}"
         style="display:none;">
    </div>

    <div class="footer">2026 Подготовка ОГЭ Русский язык</div>

    <script>
        const correctAnswer = document.getElementById('task-data').dataset.correctAnswer;
        const taskType = document.getElementById('task-data').dataset.taskType;
        const topicId = parseInt(document.getElementById('task-data').dataset.topicId);

        document.getElementById('submitBtn').addEventListener('click', async () => {
            const answer = document.getElementById('answerInput').value.trim();
            if (!answer) return;

            try {
                const response = await fetch('/api/submit_task', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        answer: answer,
                        correct_answer: correctAnswer,
                        task_type: taskType,
                        topic_id: topicId
                    })
                });
                const data = await response.json();
                const msgDiv = document.getElementById('resultMessage');
                if (data.correct) {
                    msgDiv.style.background = '#dcfce7';
                    msgDiv.style.color = '#166534';
                    msgDiv.textContent = 'Верно!';
                } else {
                    msgDiv.style.background = '#fee2e2';
                    msgDiv.style.color = '#991b1b';
                    msgDiv.textContent = `Неверно. Правильный ответ: ${data.correct_answer}`;
                }
            } catch (error) {
                console.error('Ошибка отправки:', error);
            }
        });
    </script>
</body>
</html>
