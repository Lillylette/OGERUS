<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>{{ test.text[:50] }} | Интерактивный тест</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        .test-container {
            max-width: 1000px;
            margin: 40px auto;
            padding: 0 24px;
        }
        .sentence-container {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(16px);
            border-radius: 48px;
            padding: 48px;
            margin-bottom: 30px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.1);
        }
        .sentence-text {
            font-size: 24px;
            line-height: 1.8;
            text-align: center;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
            margin-bottom: 40px;
        }
        .word-token {
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            transition: all 0.2s;
            padding: 4px 8px;
            border-radius: 12px;
        }
        .word-token:hover {
            background: #f3e8ff;
            transform: scale(1.05);
        }
        .word-text {
            font-weight: 600;
            color: #1e1b4b;
        }
        .punctuation-mark {
            font-size: 20px;
            font-weight: bold;
            color: #ec4899;
            margin-top: 4px;
            min-height: 32px;
        }
        .punctuation-selector {
            position: fixed;
            background: white;
            border-radius: 60px;
            padding: 12px 20px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.2);
            display: none;
            z-index: 1000;
            gap: 8px;
            border: 2px solid #d8b4fe;
        }
        .punct-btn {
            padding: 8px 16px;
            border: none;
            background: #f3e8ff;
            border-radius: 40px;
            cursor: pointer;
            font-size: 18px;
            font-weight: bold;
            transition: all 0.2s;
        }
        .punct-btn:hover {
            background: #ec4899;
            color: white;
            transform: scale(1.05);
        }
        .punct-btn.remove {
            background: #fee2e2;
            color: #991b1b;
        }
        .check-btn {
            background: linear-gradient(105deg, #f59e0b, #ec4899);
            color: white;
            border: none;
            padding: 14px 32px;
            border-radius: 40px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin-top: 20px;
        }
        .reset-btn {
            background: rgba(255,255,255,0.8);
            border: 2px solid #d8b4fe;
            color: #7e22ce;
            padding: 10px 24px;
            border-radius: 40px;
            cursor: pointer;
            margin-left: 12px;
        }
        .result-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 2000;
            overflow-y: auto;
        }
        .result-content {
            background: white;
            max-width: 900px;
            margin: 40px auto;
            border-radius: 48px;
            padding: 40px;
            position: relative;
        }
        .close-modal {
            position: absolute;
            top: 20px;
            right: 30px;
            font-size: 30px;
            cursor: pointer;
            color: #999;
        }
        .analysis-section {
            margin-top: 30px;
            padding: 20px;
            border-radius: 24px;
        }
        .grammar-highlight {
            background: #dcfce7;
            padding: 16px;
            border-radius: 16px;
            margin: 16px 0;
            border-left: 4px solid #22c55e;
        }
        .clause-highlight {
            background: #fef3c7;
            padding: 16px;
            border-radius: 16px;
            margin: 16px 0;
            border-left: 4px solid #fbbf24;
        }
        .scheme-highlight {
            background: #f3e8ff;
            padding: 16px;
            border-radius: 16px;
            margin: 16px 0;
            font-family: monospace;
            font-size: 18px;
            text-align: center;
        }
        .result-word {
            display: inline;
            font-size: 18px;
            line-height: 2;
        }
        .result-word.correct-punct {
            background: #dcfce7;
            border-radius: 8px;
            padding: 2px 4px;
        }
        .result-word.wrong-punct {
            background: #fee2e2;
            border-radius: 8px;
            padding: 2px 4px;
        }
        .stats {
            text-align: center;
            margin: 20px 0;
            font-size: 18px;
        }
        .score-good { color: #166534; font-size: 32px; font-weight: bold; }
        .score-bad { color: #991b1b; font-size: 32px; font-weight: bold; }
        .progress {
            text-align: center;
            margin-bottom: 20px;
            color: #7e22ce;
            font-weight: 600;
        }
    </style>
</head>
<body>
    {% include '_header.html' %}

    <div class="test-container">
        <div class="progress">Тест {{ test.id }} из {{ total }}</div>
        
        <div class="sentence-container">
            <div class="sentence-text" id="sentenceText">
                {% for word in words %}
                <div class="word-token" data-word-index="{{ loop.index0 }}" data-word-text="{{ word.text }}">
                    <span class="word-text">{{ word.text }}</span>
                    <span class="punctuation-mark" id="punct-{{ loop.index0 }}">
                        {% if word.punctuation %}{{ word.punctuation }}{% endif %}
                    </span>
                </div>
                {% endfor %}
            </div>
            
            <button class="check-btn" onclick="checkTest()">Проверить ответы</button>
            <button class="reset-btn" onclick="resetTest()">Сбросить всё</button>
        </div>
    </div>

    <!-- Селектор знаков препинания -->
    <div id="punctuationSelector" class="punctuation-selector">
        <button class="punct-btn" data-punct=",">,</button>
        <button class="punct-btn" data-punct=";">;</button>
        <button class="punct-btn" data-punct=":">:</button>
        <button class="punct-btn" data-punct=".">.</button>
        <button class="punct-btn" data-punct="!">!</button>
        <button class="punct-btn" data-punct="?">?</button>
        <button class="punct-btn" data-punct="-">-</button>
        <button class="punct-btn remove" data-punct="">Удалить</button>
    </div>

    <!-- Модальное окно с результатами -->
    <div id="resultModal" class="result-modal">
        <div class="result-content">
            <span class="close-modal" onclick="closeModal()">&times;</span>
            <h2 style="color:#4c1d95;">Результаты проверки</h2>
            <div id="resultContent"></div>
            <button onclick="closeModal()" style="margin-top:20px; padding:12px 24px; background:#7e22ce; color:white; border:none; border-radius:40px; cursor:pointer;">Закрыть</button>
        </div>
    </div>

    <script>
        let currentWordIndex = null;
        let selector = document.getElementById('punctuationSelector');
        
        // Обработчики кликов по словам
        document.querySelectorAll('.word-token').forEach(wordDiv => {
            wordDiv.addEventListener('click', (e) => {
                e.stopPropagation();
                const rect = wordDiv.getBoundingClientRect();
                currentWordIndex = parseInt(wordDiv.dataset.wordIndex);
                selector.style.display = 'flex';
                selector.style.left = rect.left + 'px';
                selector.style.top = (rect.bottom + 5) + 'px';
            });
        });
        
        // Закрытие селектора при клике вне
        document.addEventListener('click', (e) => {
            if (!selector.contains(e.target) && !e.target.closest('.word-token')) {
                selector.style.display = 'none';
            }
        });
        
        // Выбор знака препинания
        document.querySelectorAll('.punct-btn').forEach(btn => {
            btn.addEventListener('click', async (e) => {
                e.stopPropagation();
                const punctuation = btn.dataset.punct;
                if (currentWordIndex !== null) {
                    // Обновляем интерфейс
                    const punctSpan = document.getElementById(`punct-${currentWordIndex}`);
                    if (punctuation) {
                        punctSpan.textContent = punctuation;
                    } else {
                        punctSpan.textContent = '';
                    }
                    
                    // Сохраняем на сервере
                    await fetch('/api/punctuation/save', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            word_index: currentWordIndex,
                            punctuation: punctuation
                        })
                    });
                }
                selector.style.display = 'none';
                currentWordIndex = null;
            });
        });
        
        async function checkTest() {
            const response = await fetch(`/api/punctuation/check/{{ test.id }}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' }
            });
            const data = await response.json();
            
            if (data.success) {
                displayResults(data);
                showModal();
            } else {
                alert('Ошибка при проверке');
            }
        }
        
        function displayResults(data) {
            const resultDiv = document.getElementById('resultContent');
            const totalErrors = data.errors_count;
            const totalWords = data.results.length;
            const correctCount = totalWords - totalErrors;
            const percentage = Math.round((correctCount / totalWords) * 100);
            
            let resultsHtml = `
                <div class="stats">
                    <div class="${percentage >= 70 ? 'score-good' : 'score-bad'}">
                        ${correctCount} / ${totalWords} правильных (${percentage}%)
                    </div>
                    ${totalErrors > 0 ? `<div style="color:#991b1b;">Ошибок: ${totalErrors}</div>` : '<div style="color:#166534;">Отлично! Все знаки расставлены верно!</div>'}
                </div>
                
                <div class="analysis-section">
                    <h3>Правильный вариант:</h3>
                    <div class="grammar-highlight" style="font-size: 20px; line-height: 1.6;">
                        ${data.correct_text}
                    </div>
                </div>
            `;
            
            // Добавляем разбор предложения
            if (data.explanation && data.explanation.analysis) {
                const analysis = data.explanation.analysis;
                resultsHtml += `
                    <div class="analysis-section">
                        <h3>Разбор предложения:</h3>
                        ${analysis.grammar ? `<div class="grammar-highlight">
                            <strong>Грамматические основы:</strong><br>
                            ${analysis.grammar}
                        </div>` : ''}
                        ${analysis.clauses ? `<div class="clause-highlight">
                            <strong>Придаточные части и обособления:</strong><br>
                            ${analysis.clauses}
                        </div>` : ''}
                        ${analysis.conjunction ? `<div class="clause-highlight">
                            <strong>Союзы и союзные слова:</strong><br>
                            ${analysis.conjunction}
                        </div>` : ''}
                        ${analysis.scheme ? `<div class="scheme-highlight">
                            <strong>Схема предложения:</strong><br>
                            ${analysis.scheme}
                        </div>` : ''}
                    </div>
                `;
            }
            
            // Добавляем пошаговый разбор
            resultsHtml += `
                <div class="analysis-section">
                    <h3>Детальный разбор:</h3>
                    <div style="font-size: 16px; line-height: 2;">
            `;
            
            let currentResultIndex = 0;
            for (const res of data.results) {
                let wordDisplay = res.word;
                if (res.correct_punct) {
                    wordDisplay += res.correct_punct;
                }
                const className = res.is_correct ? 'correct-punct' : 'wrong-punct';
                resultsHtml += `<span class="result-word ${className}">${wordDisplay} </span>`;
                currentResultIndex++;
            }
            
            resultsHtml += `
                    </div>
                </div>
            `;
            
            resultDiv.innerHTML = resultsHtml;
        }
        
        function showModal() {
            document.getElementById('resultModal').style.display = 'block';
        }
        
        function closeModal() {
            document.getElementById('resultModal').style.display = 'none';
        }
        
        async function resetTest() {
            if (confirm('Сбросить все знаки препинания?')) {
                await fetch(`/api/punctuation/reset/{{ test.id }}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' }
                });
                location.reload();
            }
        }
    </script>
</body>
</html>
