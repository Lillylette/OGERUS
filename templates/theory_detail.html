<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Теория: {{ topic }} | ОГЭRUS</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        .main-content { max-width:900px; margin:40px auto; padding:0 24px; }
        .theory-card { background:rgba(255,255,255,0.85); backdrop-filter:blur(16px); border-radius:48px; padding:40px; border:1px solid rgba(255,255,255,0.8); }
        h1 { font-size:32px; color:#4c1d95; margin-bottom:24px; }
        .content { font-size:16px; line-height:1.8; white-space:pre-wrap; color:#1e1b4b; }
        .btn-back { display:inline-block; margin-top:24px; padding:12px 32px; background:rgba(255,255,255,0.5); border:1px solid #d8b4fe; border-radius:40px; color:#7e22ce; text-decoration:none; font-weight:600; }
        .btn-back:hover { background:white; }
    </style>
</head>
<body>
    {% include '_header.html' %}

    <div class="main-content">
        <div class="theory-card">
            <h1>{{ topic|replace('_', ' ')|title }}</h1>
            <div class="content">{{ content }}</div>
            <a href="{{ url_for('theory.theory') }}" class="btn-back">← Назад к теории</a>
        </div>
    </div>

    <div class="footer">2026 Подготовка ОГЭ Русский язык</div>
</body>
</html>
